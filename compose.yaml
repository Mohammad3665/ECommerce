services:
  mailhog:
    image: mailhog/mailhog:latest
    container_name: ecommerce-mailhog
    ports:
      - "1025:1025"
      - "38025:8025"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8025/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  seq:
    image: datalust/seq:latest
    container_name: ecommerce-seq
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=true
      # - SEQ_FIRSTRUN_ADMINUSERNAME=admin
      # - SEQ_FIRSTRUN_ADMINPASSWORD=Admin123!
    ports:
      - "5341:80"
    volumes:
      - seq-data:/data
    networks:
      - ecommerce-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7.2-alpine
    container_name: ecommerce-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ecommerce_db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Password123
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    networks:
      - ecommerce-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P "Password123" -Q "SELECT 1" -b -o /dev/null
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ecommerceapi:
    image: ecommerceapi
    build:
      context: .
      dockerfile: src/ECommerce.Api/Dockerfile
    ports:
      - "5000:8080" # HTTP
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # ASP.NET Core
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080;

      # Connection Strings
      - ConnectionStrings__DefaultConnection=Server=ecommerce_db;Database=ECommerceDB;User=sa;Password=Password123;TrustServerCertificate=True;

      # Serilog (override Seq URL)
      - Serilog__WriteTo__1__Name=Seq
      - Serilog__WriteTo__1__Args__serverUrl=http://seq:80

      # Redis
      - Redis__ConnectionString=redis:6379,abortConnect=false

      # JWT
      - JwtSettings__Secret=SuperSecretKeyMustBeVeryLongToSatisfySecurityAlgorithms123!
      - JwtSettings__Secret=${JWT_SECRET}
      - JwtSettings__Issuer=ECommerceApi
      - JwtSettings__Audience=ECommerceClient
      - JwtSettings__ExpiryInMinutes=60

      # ZarinPal
      - ZarinPal__MerchantId=00000000-0000-0000-0000-000000000000
      - ZarinPal__CallbackUrl=http://host.docker.internal:5000/Api/V1/Payment/Verify

      # SMTP (Mailhog)
      - SmtpSettings__Host=mailhog
      - SmtpSettings__Port=1025
      - SmtpSettings__SenderEmail=no-reply@ecommerce.com
      - SmtpSettings__SenderName=ECommerce Team
      - SmtpSettings__EnableSsl=false

      # HealthChecks UI Settings
      - HealthChecksUI__HealthChecks__0__Name=ECommerce API
      - HealthChecksUI__HealthChecks__0__Uri=http://localhost:8080/HealthChecks
      - HealthChecksUI__Webhooks__0__Name=
      - HealthChecksUI__Webhooks__0__Uri=
      - HealthChecksUI__Webhooks__0__Payload=
      - HealthChecksUI__EvaluationTimeInSeconds=10
      - HealthChecksUI__MinimumSecondsBetweenFailureNotifications=60
      - HealthChecksUI__HealthCheckDatabaseConnectionString=Data Source=./healthchecks.db

      # Health Checks UI Storage
      - HealthChecksUIStorage__StorageType=InMemory
    depends_on:
      redis:
        condition: service_healthy
      ecommerce_db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/Health/Live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ./src/ECommerce.Api/wwwroot:/app/wwwroot
    networks:
      - ecommerce-network
    restart: on-failure

volumes:
  mssql_data:
  redis-data:
  seq-data:

networks:
  ecommerce-network:
    driver: bridge
